<head>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",

<body class="bg-gray-50">
  <div id="root"></div>

  <script>
    window.addEventListener('error', function(e) {
      const root = document.getElementById('root');
      if (root && !root.innerHTML.includes('網頁載入發生異常')) {
        root.innerHTML = '<div style="padding:20px;color:#b91c1c;background:#fef2f2;border-radius:12px;margin:20px;font-family:sans-serif;"> <h3 style="font-weight:bold;margin-bottom:8px;">⚠️ 網頁載入發生異常</h3> <p style="font-size:12px;word-break:break-all;">錯誤細節: ' + e.message + '</p> </div>' + root.innerHTML;
      }
    });
  </script>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Camera, Plus, Edit2, Check, X, AlertCircle, Utensils, Calendar, User, Clock, Settings, Activity, ChevronLeft, ChevronRight, Zap, Trash2, Key, ChevronDown, ChevronUp, Copy, Sparkles, Loader2 } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, serverTimestamp, setDoc } from 'firebase/firestore';

    const safeStorage = {
      get: (key) => { try { return localStorage.getItem(key); } catch (e) { return null; } },
      set: (key, value) => { try { localStorage.setItem(key, value); } catch (e) {} }
    };

    const getLocalISODate = () => {
      const d = new Date();
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().split('T')[0];
    };

    const compressImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            const MAX_DIM = 800; 
            if (width > height && width > MAX_DIM) {
              height *= MAX_DIM / width;
              width = MAX_DIM;
            } else if (height > MAX_DIM) {
              width *= MAX_DIM / height;
              height = MAX_DIM;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6)); 
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    // --- 你真實的 Firebase 設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAHyp0MZYzjLGI9GM2rSu-HromoUPM_ims",
      authDomain: "diet-app-ruby.firebaseapp.com",
      projectId: "diet-app-ruby",
      storageBucket: "diet-app-ruby.firebasestorage.app",
      messagingSenderId: "1020331366124",
      appId: "1:1020331366124:web:b97c6907e5d847c698b7c9",
      measurementId: "G-W77JSCS267"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const defaultApiKey = ""; 

    function App() {
      const [activeTab, setActiveTab] = useState('record');
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(''); 
      const [customApiKey, setCustomApiKey] = useState('');
      
      const [person, setPerson] = useState('Ruby');
      const [date, setDate] = useState(getLocalISODate());
      const [meal, setMeal] = useState('午餐'); 

      const [expandedLogId, setExpandedLogId] = useState(null);
      const [tokenUsage, setTokenUsage] = useState(0);
      const DAILY_TOKEN_LIMIT = 20000;

      useEffect(() => {
        const todayStr = getLocalISODate();
        const storedStr = safeStorage.get('dietTrackerTokenUsage');
        const storedData = storedStr ? JSON.parse(storedStr) : {};
        if (storedData.date === todayStr) setTokenUsage(storedData.usage || 0);
        else { safeStorage.set('dietTrackerTokenUsage', JSON.stringify({ date: todayStr, usage: 0 })); setTokenUsage(0); }
        const savedApiKey = safeStorage.get('dietTrackerApiKey');
        if (savedApiKey) setCustomApiKey(savedApiKey);
      }, []);

      const handleSaveApiKey = (key) => {
        setCustomApiKey(key);
        safeStorage.set('dietTrackerApiKey', key);
      };

      useEffect(() => {
        let isMockUser = false;
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (error) {
            setDbError("身分驗證連線失敗。請確認 Vercel 網址已加入 Firebase 授權網域。");
            setUser({ uid: 'local_test_user' });
            isMockUser = true;
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) setUser(currentUser);
          else if (!isMockUser) setUser(null);
        });
        return () => unsubscribe();
      }, []);

      const [dailyLog, setDailyLog] = useState([]);
      
      useEffect(() => {
        if (!user) return;
        const logsRef = collection(db, 'diet_logs');
        const unsubscribe = onSnapshot(logsRef, (snapshot) => {
            setDbError(''); 
            const logsData = [];
            snapshot.forEach((doc) => logsData.push({ id: doc.id, ...doc.data() }));
            logsData.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
            setDailyLog(logsData);
          }, (error) => setDbError("讀取權限遭拒：" + error.message)
        );
        return () => unsubscribe();
      }, [user]);

      // --- 建立歷史食物庫 (供自動帶入與選單使用) ---
      const foodHistoryDB = useMemo(() => {
        const history = {};
        // dailyLog 已照時間排序 (舊->新)，後面的資料會覆蓋前面的，確保採用最新數據
        dailyLog.forEach(log => {
          log.items.forEach(item => {
            if (item.name && item.name.trim()) {
              const trimmedName = item.name.trim();
              const w = Number(item.weight);
              let bCal = item.baseCalPerG;
              let bPro = item.baseProPerG;
              
              // 處理舊版手動輸入沒有 baseCalPerG 的資料 (溯及既往)
              if (bCal === undefined || isNaN(bCal)) {
                bCal = w > 0 ? (Number(item.calories) || 0) / w : 0;
                bPro = w > 0 ? (Number(item.protein) || 0) / w : 0;
              }

              history[trimmedName] = {
                baseCalPerG: bCal,
                baseProPerG: bPro,
                lastWeight: w > 0 ? w : 100 // 紀錄上次吃的重量供智慧預設使用
              };
            }
          });
        });
        return history;
      }, [dailyLog]);

      const defaultProfiles = {
        'Ruby': { gender: 'female', height: 160, weight: 50, age: 30, activity: 1.2, targetLoss: 0, targetWeeks: 0, weightHistory: [] },
        '佑霖': { gender: 'male', height: 175, weight: 70, age: 30, activity: 1.2, targetLoss: 0, targetWeeks: 0, weightHistory: [] }
      };

      const [profiles, setProfiles] = useState(defaultProfiles);
      const [isSavingProfiles, setIsSavingProfiles] = useState(false);

      useEffect(() => {
        if (!user) return;
        const profileDocRef = doc(db, 'system_settings', 'shared_profiles');
        const unsubscribe = onSnapshot(profileDocRef, (docSnap) => {
          if (docSnap.exists()) {
             const data = docSnap.data();
             if (!data['Ruby'].weightHistory) data['Ruby'].weightHistory = [];
             if (!data['佑霖'].weightHistory) data['佑霖'].weightHistory = [];
             setProfiles(data);
          }
          else setDoc(profileDocRef, defaultProfiles).catch(e => {});
        });
        return () => unsubscribe();
      }, [user]);

      const saveProfilesToCloud = async () => {
        if (!user) return;
        setIsSavingProfiles(true);
        try {
          await setDoc(doc(db, 'system_settings', 'shared_profiles'), profiles);
          setTimeout(() => setIsSavingProfiles(false), 2000);
        } catch (error) { setDbError("設定同步失敗：" + error.message); setIsSavingProfiles(false); }
      };

      const addWeightLog = () => {
        const now = new Date();
        const dateStr = getLocalISODate();
        const timeStr = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
        const currentWeight = profiles[person].weight;

        setProfiles(prev => {
          const updated = { ...prev[person] };
          const history = [...(updated.weightHistory || [])];
          history.unshift({ id: Date.now().toString(), date: dateStr, time: timeStr, weight: currentWeight });
          updated.weightHistory = history;
          return { ...prev, [person]: updated };
        });
      };

      const deleteWeightLog = (logId) => {
        setProfiles(prev => {
          const updated = { ...prev[person] };
          updated.weightHistory = (updated.weightHistory || []).filter(item => item.id !== logId);
          return { ...prev, [person]: updated };
        });
      };

      // --- 狀態管理 ---
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [isAutoFilling, setIsAutoFilling] = useState(false);
      const [isCompressing, setIsCompressing] = useState(false);
      const [currentImages, setCurrentImages] = useState([]);
      const [userContext, setUserContext] = useState('');
      const [pendingItem, setPendingItem] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');
      const fileInputRef = useRef(null);

      const filteredLog = dailyLog.filter(item => item.person === person && item.date === date);
      const totalCalories = filteredLog.reduce((sum, entry) => sum + entry.items.reduce((itemSum, i) => itemSum + Number(i.calories || 0), 0), 0);
      const totalProtein = filteredLog.reduce((sum, entry) => sum + entry.items.reduce((itemSum, i) => itemSum + Number(i.protein || 0), 0), 0);

      const targetData = React.useMemo(() => {
        const p = profiles[person];
        if (!p.height || !p.weight || !p.age) return { tdee: 0, target: 0, warning: '' };
        let bmr = (10 * p.weight) + (6.25 * p.height) - (5 * p.age);
        bmr += p.gender === 'male' ? 5 : -161;
        const tdee = Math.round(bmr * p.activity);
        let dailyTarget = tdee;
        let warning = '';
        if (p.targetLoss > 0 && p.targetWeeks > 0) {
          const dailyDeficit = Math.round((p.targetLoss * 7700) / (p.targetWeeks * 7));
          dailyTarget = tdee - dailyDeficit;
          const weeklyLossRate = p.targetLoss / p.targetWeeks;
          const safeWeeklyLoss = p.weight * 0.01; 
          if (weeklyLossRate > safeWeeklyLoss) warning = `目標過於激進！每週減重超過 ${safeWeeklyLoss.toFixed(1)}kg 易流失肌肉並復胖。`;
          else if (p.gender === 'female' && dailyTarget < 1200) warning = `目標熱量低於 1200 kcal，有營養不良風險。`;
          else if (p.gender === 'male' && dailyTarget < 1500) warning = `目標熱量低於 1500 kcal，有營養不良風險。`;
        }
        return { tdee, target: Math.round(dailyTarget), warning };
      }, [person, profiles]);

      const adjustDate = (days) => {
        const d = new Date(date);
        d.setDate(d.getDate() + days);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        setDate(`${year}-${month}-${day}`);
      };

      const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        
        setIsCompressing(true);
        try {
          const compressedBase64s = await Promise.all(files.map(file => compressImage(file)));
          setCurrentImages(prev => [...prev, ...compressedBase64s]);
          setUserContext('');
        } catch (error) {
          setErrorMsg("圖片壓縮失敗，請重試。");
        } finally {
          setIsCompressing(false);
        }
      };

      const analyzeImage = async () => {
        const activeApiKey = customApiKey.trim() || defaultApiKey;
        if (!activeApiKey) { setErrorMsg('請先至「設定」輸入金鑰。'); return; }
        if (currentImages.length === 0) return;
        
        setIsAnalyzing(true);
        setErrorMsg('');
        setPendingItem(null);

        try {
          const imageParts = currentImages.map(img => {
            const base64Data = img.split(',')[1];
            const mimeType = img.split(';')[0].split(':')[1];
            return { inlineData: { mimeType, data: base64Data } };
          });

          const extraContext = userContext.trim() ? `\n\n【使用者特別說明】：${userContext}\n警告：請務必優先採納說明來調整份量！` : '';
          const prompt = `分析這些食物照片。這是一份來自台灣使用者的同餐飲食。${extraContext}
請將照片中的所有食物統整拆解成不同的「單項品項」。
務必以 JSON 格式回傳，不可包含 Markdown。格式：
{
  "items": [
    { "name": "名稱", "weight": 預估重量(數字), "calories": 熱量數字, "protein": 蛋白質數字 }
  ],
  "reasoning": "整體估算基準與隱藏油脂考量"
}`;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: "user", parts: [{ text: prompt }, ...imageParts] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          if (!response.ok) {
            let errorDetail = "";
            try { const errorData = await response.json(); errorDetail = errorData.error?.message; } catch(e){}
            if (response.status === 400) throw new Error(`請求遭拒，請確認金鑰未夾帶空白。細節：${errorDetail}`);
            if (response.status === 403) throw new Error(`權限遭拒，請確認使用的是 AI Studio 金鑰。細節：${errorDetail}`);
            throw new Error(`連線失敗 (${response.status}): ${errorDetail}`);
          }

          const data = await response.json();
          const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (data.usageMetadata) {
            setTokenUsage(prev => {
              const newUsage = prev + (data.usageMetadata.totalTokenCount || 0);
              safeStorage.set('dietTrackerTokenUsage', JSON.stringify({ date: getLocalISODate(), usage: newUsage }));
              return newUsage;
            });
          }

          if (!textResult) throw new Error("API 未回傳內容");
          const resultObj = JSON.parse(textResult);
          
          const processedItems = (Array.isArray(resultObj.items) ? resultObj.items : []).map((item, idx) => ({
            id: Date.now().toString() + '_' + idx,
            name: item.name || '未知',
            weight: item.weight || 100,
            calories: item.calories || 0,
            protein: item.protein || 0,
            baseCalPerG: (item.weight > 0) ? (item.calories || 0) / item.weight : 0,
            baseProPerG: (item.weight > 0) ? (item.protein || 0) / item.weight : 0,
          }));
          
          setPendingItem({
            id: Date.now().toString(),
            items: processedItems.length > 0 ? processedItems : [{ id: Date.now().toString() + '_0', name: '未辨識食物', weight: 100, calories: 0, protein: 0, baseCalPerG: 0, baseProPerG: 0 }],
            reasoning: resultObj.reasoning || '無法提供估算依據',
            images: currentImages 
          });

        } catch (error) {
          setErrorMsg(error.message || "圖片分析失敗。");
        } finally {
          setIsAnalyzing(false);
        }
      };

      const autoFillMissingMacros = async () => {
        const activeApiKey = customApiKey.trim() || defaultApiKey;
        if (!activeApiKey) { setErrorMsg('請先設定金鑰才能使用 AI 估算。'); return; }
        if (!pendingItem) return;

        const itemsToEstimate = pendingItem.items.filter(i => i.name.trim() !== '' && (!i.baseCalPerG));
        if (itemsToEstimate.length === 0) return;

        setIsAutoFilling(true);
        setErrorMsg('');

        try {
          const namesToFetch = itemsToEstimate.map(i => i.name).join(', ');
          const prompt = `請估算以下台灣常見食物「每 100 克」的熱量與蛋白質。
務必以純 JSON 陣列格式回傳，格式要求：[{"name":"與原名完全相同的名稱", "calPer100g": 熱量數字, "proPer100g": 蛋白質數字}]
食物列表：${namesToFetch}`;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ role: "user", parts: [{ text: prompt }] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          if (!response.ok) throw new Error("AI 估算失敗");
          const data = await response.json();
          const resultArr = JSON.parse(data.candidates[0].content.parts[0].text);

          setPendingItem(prev => {
            const newItems = prev.items.map(item => {
              const fetchedData = resultArr.find(r => r.name === item.name);
              if (fetchedData) {
                const baseCal = fetchedData.calPer100g / 100;
                const basePro = fetchedData.proPer100g / 100;
                const w = Number(item.weight) || 100;
                return {
                  ...item,
                  weight: item.weight || 100, 
                  baseCalPerG: baseCal,
                  baseProPerG: basePro,
                  calories: Math.round(baseCal * w),
                  protein: Math.round(basePro * w * 10) / 10
                };
              }
              return item;
            });
            return { ...prev, items: newItems, reasoning: prev.reasoning === '手動輸入' ? '已透過 AI 補全部分營養基準值' : prev.reasoning };
          });

        } catch(error) {
          setErrorMsg("補全數值失敗：" + error.message);
        } finally {
          setIsAutoFilling(false);
        }
      };

      const handleItemChange = (itemId, field, value) => {
        setPendingItem(prev => {
          if (!prev) return prev;
          const newItems = prev.items.map(item => {
            if (item.id !== itemId) return item;
            const updated = { ...item, [field]: value };
            if (value === '') return updated;
            
            // 如果修改的是名稱，檢查歷史紀錄是否有符合的
            if (field === 'name') {
              const trimmedName = value.trim();
              if (foodHistoryDB[trimmedName]) {
                updated.baseCalPerG = foodHistoryDB[trimmedName].baseCalPerG;
                updated.baseProPerG = foodHistoryDB[trimmedName].baseProPerG;
                
                // 智慧預設：若重量為空，自動帶入上次紀錄的重量，讓數字直接浮現
                if (!updated.weight) {
                  updated.weight = foodHistoryDB[trimmedName].lastWeight;
                }

                // 順便套用歷史基準重算
                if (updated.weight) {
                  const currentW = Number(updated.weight);
                  updated.calories = Math.round(updated.baseCalPerG * currentW);
                  updated.protein = Math.round(updated.baseProPerG * currentW * 10) / 10;
                }
              }
            }
            
            const numVal = Number(value);
            if (field === 'weight' && updated.baseCalPerG !== undefined) {
              updated.calories = Math.round(updated.baseCalPerG * numVal);
              updated.protein = Math.round(updated.baseProPerG * numVal * 10) / 10;
            } else if (field === 'calories' && item.weight) {
              updated.baseCalPerG = numVal / Number(item.weight);
            } else if (field === 'protein' && item.weight) {
              updated.baseProPerG = numVal / Number(item.weight);
            }
            return updated;
          });
          return { ...prev, items: newItems };
        });
      };

      const addManualItem = () => {
        setPendingItem(prev => {
          if (!prev) return prev;
          return { ...prev, items: [...prev.items, { id: Date.now().toString(), name: '', weight: '', calories: '', protein: '', baseCalPerG: 0, baseProPerG: 0 }] };
        });
      };

      const removePendingItem = (itemId) => {
        setPendingItem(prev => prev ? { ...prev, items: prev.items.filter(i => i.id !== itemId) } : prev);
      };

      const handleManualEntry = () => {
        setPendingItem({
          id: Date.now().toString(),
          items: [{ id: Date.now().toString() + '_m', name: '', weight: '', calories: '', protein: '', baseCalPerG: 0, baseProPerG: 0 }],
          reasoning: '手動輸入',
          images: []
        });
        setCurrentImages([]);
        setUserContext('');
        setIsAnalyzing(false);
      };

      const confirmItem = async () => {
        if (!pendingItem || !user) return;
        try {
          await addDoc(collection(db, 'diet_logs'), {
            person, date, meal,
            items: pendingItem.items,
            reasoning: pendingItem.reasoning,
            images: pendingItem.images || [], 
            createdAt: serverTimestamp(),

                        />
                      </div>

                      <div className="flex gap-3 pt-2">
                        <button
                          onClick={() => { setCurrentImages([]); setUserContext(''); if (fileInputRef.current) fileInputRef.current.value = ''; }}
                          className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 flex items-center justify-center gap-2"
                        >
                          <X className="w-4 h-4" /> 取消
                        </button>
                        <button
                          onClick={analyzeImage}
                          className="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 flex items-center justify-center gap-2 shadow-sm transition-colors"
                        >
                          <Camera className="w-4 h-4" /> 開始 AI 辨識
                        </button>
                      </div>
                    </div>
                  )}

                  {isAnalyzing && (
                    <div className="py-12 flex flex-col items-center justify-center">
                      <div className="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <p className="text-gray-600 font-medium">AI 正在分析食物成分...</p>
                    </div>
                  )}

                  {errorMsg && (
                    <div className="mt-4 p-4 bg-red-50 text-red-700 rounded-xl flex items-start gap-3 border border-red-100">
                      <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                      <div>
                        <p className="font-medium text-sm">辨識發生錯誤</p>
                        <p className="text-xs mt-1 opacity-80">{errorMsg}</p>
                      </div>
                    </div>
                  )}

                  {/* --- 編輯區塊 --- */}
                  {pendingItem && !isAnalyzing && (
                    <div className="space-y-4 animate-in fade-in zoom-in duration-200">
                      
                      {/* 顯示多張照片 */}
                      {pendingItem.images && pendingItem.images.length > 0 ? (
                        <div className="flex gap-2 overflow-x-auto pb-2 snap-x">
                          {pendingItem.images.map((img, idx) => (
                             <div key={idx} className="relative h-32 min-w-[8rem] rounded-xl overflow-hidden bg-gray-100 snap-center shrink-0 border border-gray-200">
                               <img src={img} alt="Uploaded food" className="w-full h-full object-cover" />
                               {idx === 0 && (
                                 <div className="absolute top-1 left-1 flex flex-col gap-1">
                                   <span className="bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded backdrop-blur-sm">{person}</span>
                                   <span className="bg-black/60 text-white text-[10px] px-1.5 py-0.5 rounded backdrop-blur-sm">{meal}</span>
                                 </div>
                               )}
                             </div>
                          ))}
                        </div>
                      ) : (
                        <div className="bg-gray-50 border border-gray-100 h-24 rounded-xl flex flex-col items-center justify-center relative">
                           <Edit2 className="w-6 h-6 text-gray-400 mb-1" />
                           <span className="text-sm font-medium text-gray-500">手動建立紀錄</span>
                           <div className="absolute top-2 left-2 flex gap-1">
                             <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-md font-medium">{person}</span>
                             <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-md font-medium">{meal}</span>
                          </div>
                        </div>
                      )}
                      
                      {pendingItem.reasoning && (
                        <div className="bg-emerald-50 text-emerald-800 p-3 rounded-lg text-sm flex gap-2 items-start border border-emerald-100">
                          <AlertCircle className="w-4 h-4 shrink-0 mt-0.5" />
                          <div>
                            <p className="font-bold text-xs">系統備註</p>
                            <p className="text-xs opacity-90 mt-0.5 leading-relaxed">{pendingItem.reasoning}</p>
                          </div>
                        </div>
                      )}

                      <div className="space-y-3">
                        {pendingItem.items.map((item, index) => (
                          <div key={item.id} className="bg-gray-50 p-3 rounded-xl border border-gray-200 relative group shadow-sm">
                            {pendingItem.items.length > 1 && (
                              <button 
                                onClick={() => removePendingItem(item.id)}
                                className="absolute -top-2 -right-2 bg-red-100 text-red-600 p-1.5 rounded-full shadow-sm hover:bg-red-200"
                              >
                                <X className="w-3 h-3" />
                              </button>
                            )}
                            <div className="mb-3">
                              <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center gap-1">
                                <Edit2 className="w-3 h-3" /> 品項 {index + 1}
                              </label>
                              <input 
                                type="text" 
                                list="food-history-list"
                                value={item.name}
                                placeholder="輸入曾吃過的名稱可自動帶入數值"
                                onChange={(e) => handleItemChange(item.id, 'name', e.target.value)}
                                className="w-full p-2.5 text-sm bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-gray-800"
                              />
                            </div>
                            <div className="grid grid-cols-3 gap-3">
                              <div className="bg-white p-2 rounded-lg border border-gray-200">
                                <label className="block text-[10px] font-bold text-gray-500 mb-1">重量 (g)</label>
                                <input 
                                  type="number" 
                                  value={item.weight}
                                  placeholder="0"
                                  onChange={(e) => handleItemChange(item.id, 'weight', e.target.value)}
                                  className="w-full text-base outline-none font-bold text-gray-800 text-center"
                                />
                              </div>
                              <div className="bg-white p-2 rounded-lg border border-gray-200">
                                <label className="block text-[10px] font-bold text-gray-500 mb-1">熱量 (kcal)</label>
                                <input 
                                  type="number" 
                                  value={item.calories}
                                  placeholder="0"
                                  onChange={(e) => handleItemChange(item.id, 'calories', e.target.value)}
                                  className="w-full text-base outline-none font-bold text-orange-600 text-center"
                                />
                              </div>
                              <div className="bg-white p-2 rounded-lg border border-gray-200">
                                <label className="block text-[10px] font-bold text-gray-500 mb-1">蛋白質 (g)</label>
                                <input 
                                  type="number" 
                                  value={item.protein}
                                  placeholder="0"
                                  onChange={(e) => handleItemChange(item.id, 'protein', e.target.value)}
                                  className="w-full text-base outline-none font-bold text-blue-600 text-center"
                                />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                      
                      <div className="flex gap-2">
                        <button 
                          onClick={addManualItem}
                          className="flex-1 py-2.5 border border-dashed border-gray-300 rounded-xl text-sm font-bold text-gray-500 hover:bg-gray-50 hover:text-emerald-600 flex items-center justify-center gap-1"
                        >
                          <Plus className="w-4 h-4" /> 新增品項
                        </button>
                        
                        <button 
                          onClick={autoFillMissingMacros}
                          disabled={isAutoFilling}
                          className="flex-1 py-2.5 bg-blue-50 border border-blue-100 rounded-xl text-sm font-bold text-blue-700 hover:bg-blue-100 flex items-center justify-center gap-1 disabled:opacity-50"
                        >
                          {isAutoFilling ? <Loader2 className="w-4 h-4 animate-spin" /> : <Sparkles className="w-4 h-4" />}
                          AI 補全數值
                        </button>
                      </div>

                      <div className="flex gap-3 pt-4 mt-4 border-t border-gray-100">
                        <button 
                          onClick={cancelItem}
                          className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 flex items-center justify-center gap-2"
                        >
                          <X className="w-5 h-5" /> 取消
                        </button>
                        <button 
                          onClick={confirmItem}
                          className="flex-[2] py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 flex items-center justify-center gap-2 shadow-md hover:shadow-lg transition-all"
                        >
                          <Check className="w-5 h-5 text-emerald-400" /> 確認存入雲端
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                {/* --- 歷史紀錄列表 --- */}
                <div className="space-y-3 pb-8">
                  <div className="flex items-center justify-between bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                    <button 
                      onClick={() => adjustDate(-1)} 
                      className="p-2 hover:bg-gray-100 rounded-lg text-gray-500 transition-colors"
                    >
                      <ChevronLeft className="w-5 h-5" />
                    </button>
                    <div className="text-center">
                      <div className="text-sm font-bold text-gray-800">
                        {date === getLocalISODate() ? '今天' : date}
                      </div>
                      <div className="text-[10px] text-gray-400 mt-0.5">{person} 的雲端紀錄</div>
                    </div>
                    <button 
                      onClick={() => adjustDate(1)} 
                      className="p-2 hover:bg-gray-100 rounded-lg text-gray-500 transition-colors"
                    >
                      <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>

                  {!user && (
                     <div className="py-8 text-center text-sm text-gray-400 bg-gray-50/50 rounded-xl border border-dashed border-gray-200">
                      正在連線至雲端資料庫...
                    </div>
                  )}

                  {user && filteredLog.length === 0 ? (
                    <div className="py-8 text-center text-sm text-gray-400 bg-gray-50/50 rounded-xl border border-dashed border-gray-200">
                      這天還沒有任何紀錄喔
                    </div>
                  ) : (
                    filteredLog.map((entry) => {
                      const entryCalories = entry.items.reduce((s, i) => s + Number(i.calories || 0), 0);
                      const entryProtein = entry.items.reduce((s, i) => s + Number(i.protein || 0), 0);
                      const itemNames = entry.items.map(i => i.name).join('、');
                      const isExpanded = expandedLogId === entry.id;
                      
                      // 支援舊版單圖結構與新版多圖結構
                      const entryFirstImage = (entry.images && entry.images.length > 0) ? entry.images[0] : entry.image;
                      
                      return (
                      <div 
                        key={entry.id} 
                        onClick={() => setExpandedLogId(isExpanded ? null : entry.id)}
                        className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 relative group cursor-pointer hover:border-emerald-200 transition-all"
                      >
                        {/* 複製給對方的按鈕 */}
                        <div className="absolute top-3 right-3 flex gap-2 z-10 opacity-0 group-hover:opacity-100 transition-all">
                           <button 
                             onClick={(e) => { e.stopPropagation(); handleCopyLog(entry); }}
                             className="p-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-md shadow-sm flex items-center gap-1"
                             title={`複製這餐給 ${person === 'Ruby' ? '佑霖' : 'Ruby'}`}
                           >
                             <Copy className="w-3 h-3" />
                             <span className="text-[10px] font-bold">複製給{person === 'Ruby' ? '佑霖' : 'Ruby'}</span>
                           </button>
                           <button 
                             onClick={(e) => { e.stopPropagation(); deleteLog(entry.id); }}
                             className="p-1.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-md shadow-sm"
                             title="刪除此紀錄"
                           >
                             <Trash2 className="w-4 h-4" />
                           </button>
                        </div>
                        
                        <div className="flex items-center gap-4">
                          <div className="w-16 h-16 rounded-lg overflow-hidden shrink-0 bg-gray-50 flex items-center justify-center border border-gray-100 relative">
                            {entryFirstImage ? (
                              <img src={entryFirstImage} alt="food" className="w-full h-full object-cover" />
                            ) : (
                              <Utensils className="w-6 h-6 text-gray-300" />
                            )}
                            {entry.images && entry.images.length > 1 && (
                               <div className="absolute bottom-1 right-1 bg-black/60 text-white text-[10px] px-1 rounded-sm backdrop-blur">
                                 +{entry.images.length - 1}
                               </div>
                            )}
                          </div>
                          <div className="flex-1 min-w-0 pr-16">
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-[10px] font-bold bg-gray-100 text-gray-600 px-2 py-0.5 rounded shrink-0">
                                {entry.meal}
                              </span>
                              <h4 className="font-bold text-gray-800 truncate text-sm">{itemNames || '未命名項目'}</h4>
                            </div>
                            <div className="flex items-center gap-3 text-sm font-medium">
                              <span className="text-gray-500">{entryCalories} kcal</span>
                              <span className="text-blue-600">{Math.round(entryProtein * 10)/10}g 蛋白質</span>
                            </div>
                            <div className="text-xs text-gray-400 mt-1 truncate flex items-center gap-1">
                              <span>共 {entry.items.length} 個品項</span>
                              {isExpanded ? <ChevronUp className="w-3 h-3" /> : <ChevronDown className="w-3 h-3" />}
                            </div>
                          </div>
                        </div>

                        {/* 展開後的詳細內容區塊 */}
                        {isExpanded && (
                          <div className="mt-4 pt-4 border-t border-gray-100 space-y-3 animate-in fade-in slide-in-from-top-2 duration-200">
                            
                            {/* 若有多張圖，展開時顯示小畫廊 */}
                            {entry.images && entry.images.length > 1 && (
                               <div className="flex gap-2 overflow-x-auto pb-2 mb-2">
                                 {entry.images.map((img, idx) => (
                                    <img key={idx} src={img} className="h-16 w-16 object-cover rounded-lg border border-gray-200 shrink-0" />
                                 ))}
                               </div>
                            )}

                            <div className="space-y-2">
                              {entry.items.map((item, idx) => (
                                <div key={idx} className="flex justify-between items-center text-xs bg-gray-50 p-2.5 rounded-lg border border-gray-100">
                                  <span className="font-bold text-gray-700">{item.name} <span className="text-gray-400 font-normal ml-1">{item.weight}g</span></span>
                                  <div className="flex items-center gap-3 font-medium">
                                    <span className="text-orange-600">{item.calories} <span className="text-[10px] text-gray-400 font-normal">kcal</span></span>
                                    <span className="text-blue-600 w-12 text-right">{item.protein} <span className="text-[10px] text-blue-400 font-normal">g</span></span>
                                  </div>
                                </div>
                              ))}
                            </div>
                            
                            {entry.reasoning && (
                              <div className="bg-emerald-50/50 p-3 rounded-lg border border-emerald-100/50 mt-2">
                                <span className="text-[10px] font-bold text-emerald-800 flex items-center gap-1 mb-1">
                                  <Activity className="w-3 h-3" /> 備註 / AI 估算依據
                                </span>
                                <p className="text-xs text-emerald-700/80 leading-relaxed">{entry.reasoning}</p>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )})
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
