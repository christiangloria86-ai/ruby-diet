<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲食紀錄</title>
  
  <!-- 載入 Tailwind CSS 樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Babel (用來讓瀏覽器看懂 React JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 設定模組路徑 (Import Map)，取代原本的 npm install -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.454.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-gray-50">
  
  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- 主要程式碼區塊 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Camera, Plus, Edit2, Check, X, AlertCircle, Utensils, Calendar, User, Clock, Settings, Activity, ChevronLeft, ChevronRight, Zap, Trash2, Key } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, serverTimestamp } from 'firebase/firestore';

const firebaseConfig = {
  apiKey: "AIzaSyAHyp0MZYzjLGI9GM2rSu-HromoUPM_ims",
  authDomain: "diet-app-ruby.firebaseapp.com",
  projectId: "diet-app-ruby",
  storageBucket: "diet-app-ruby.firebasestorage.app",
  messagingSenderId: "1020331366124",
  appId: "1:1020331366124:web:b97c6907e5d847c698b7c9",
  measurementId: "G-W77JSCS267"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 系統預設環境變數 (供本地無痛測試使用，上線請留空)
    const defaultApiKey = ""; 

    function App() {
      const [activeTab, setActiveTab] = useState('record');
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(''); // 新增：資料庫連線錯誤狀態
      
      // 自訂 API Key 狀態
      const [customApiKey, setCustomApiKey] = useState('');
      
      // 上下文狀態
      const [person, setPerson] = useState('Ruby');
      const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
      const [meal, setMeal] = useState('午餐'); 

      // Token 消耗追蹤狀態
      const DAILY_TOKEN_LIMIT = 20000;
      const [tokenUsage, setTokenUsage] = useState(0);

      // 初始化 localStorage 的資料 (Token 與 API Key)
      useEffect(() => {
        const todayStr = new Date().toISOString().split('T')[0];
        const storedData = JSON.parse(localStorage.getItem('dietTrackerTokenUsage') || '{}');
        if (storedData.date === todayStr) {
          setTokenUsage(storedData.usage || 0);
        } else {
          localStorage.setItem('dietTrackerTokenUsage', JSON.stringify({ date: todayStr, usage: 0 }));
          setTokenUsage(0);
        }

        const savedApiKey = localStorage.getItem('dietTrackerApiKey');
        if (savedApiKey) {
          setCustomApiKey(savedApiKey);
        }
      }, []);

      const handleSaveApiKey = (key) => {
        setCustomApiKey(key);
        localStorage.setItem('dietTrackerApiKey', key);
      };

      // --- Firebase 身分驗證初始化 (匿名登入) ---
      useEffect(() => {
        let isMockUser = false;
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (error) {
            console.warn("Firebase Auth 未啟用，已自動切換為測試模式。如需正式使用，請至 Firebase 啟用「匿名登入 (Anonymous)」。", error);
            setDbError("身分驗證連線失敗。若要跨裝置同步，請確認 Vercel 網址已加入 Firebase 授權網域。");
            setUser({ uid: 'local_test_user' });
            isMockUser = true;
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
          } else if (!isMockUser) {
            setUser(null);
          }
        });
        return () => unsubscribe();
      }, []);

      // --- 雲端資料庫狀態 ---
      const [dailyLog, setDailyLog] = useState([]);
      
      // 監聽專屬 Firebase 專案的資料
      useEffect(() => {
        if (!user) return;
        const logsRef = collection(db, 'diet_logs');
        
        const unsubscribe = onSnapshot(
          logsRef,
          (snapshot) => {
            setDbError(''); // 讀取成功時清除錯誤
            const logsData = [];
            snapshot.forEach((doc) => {
              logsData.push({ id: doc.id, ...doc.data() });
            });
            
            logsData.sort((a, b) => {
              const timeA = a.createdAt?.toMillis() || 0;
              const timeB = b.createdAt?.toMillis() || 0;
              return timeA - timeB; 
            });
            
            setDailyLog(logsData);
          },
          (error) => {
            console.error("Firestore Listen Error:", error);
            setDbError("讀取權限遭拒：" + error.message);
          }
        );

        return () => unsubscribe();
      }, [user]);

      // --- 設定與其他狀態 (包含 LocalStorage 存取) ---
      const defaultProfiles = {
        'Ruby': { gender: 'female', height: 160, weight: 50, age: 30, activity: 1.2, targetLoss: 0, targetWeeks: 0 },
        '佑霖': { gender: 'male', height: 175, weight: 70, age: 30, activity: 1.2, targetLoss: 0, targetWeeks: 0 }
      };

      const [profiles, setProfiles] = useState(() => {
        try {
          const savedProfiles = localStorage.getItem('dietTrackerProfiles');
          return savedProfiles ? JSON.parse(savedProfiles) : defaultProfiles;
        } catch (error) {
          console.error("無法讀取設定檔", error);
          return defaultProfiles;
        }
      });

      // 當設定數值改變時，自動同步到 LocalStorage
      useEffect(() => {
        localStorage.setItem('dietTrackerProfiles', JSON.stringify(profiles));
      }, [profiles]);

      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [currentImage, setCurrentImage] = useState(null);
      const [userContext, setUserContext] = useState('');
      const [pendingItem, setPendingItem] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');
      const fileInputRef = useRef(null);

      const filteredLog = dailyLog.filter(item => item.person === person && item.date === date);

      const totalCalories = filteredLog.reduce((sum, entry) => sum + entry.items.reduce((itemSum, i) => itemSum + Number(i.calories || 0), 0), 0);
      const totalProtein = filteredLog.reduce((sum, entry) => sum + entry.items.reduce((itemSum, i) => itemSum + Number(i.protein || 0), 0), 0);

      const targetData = React.useMemo(() => {
        const p = profiles[person];
        if (!p.height || !p.weight || !p.age) return { tdee: 0, target: 0, warning: '' };
        
        let bmr = (10 * p.weight) + (6.25 * p.height) - (5 * p.age);
        bmr += p.gender === 'male' ? 5 : -161;
        
        const tdee = Math.round(bmr * p.activity);
        let dailyTarget = tdee;
        let warning = '';
        
        if (p.targetLoss > 0 && p.targetWeeks > 0) {
          const dailyDeficit = Math.round((p.targetLoss * 7700) / (p.targetWeeks * 7));
          dailyTarget = tdee - dailyDeficit;
          
          const weeklyLossRate = p.targetLoss / p.targetWeeks;
          const safeWeeklyLoss = p.weight * 0.01; 
          
          if (weeklyLossRate > safeWeeklyLoss) {
            warning = `目標過於激進！每週減重超過 ${safeWeeklyLoss.toFixed(1)}kg 易流失肌肉並復胖。`;
          } else if (p.gender === 'female' && dailyTarget < 1200) {
            warning = `目標熱量低於 1200 kcal，可能有營養不良及代謝補償的風險。`;
          } else if (p.gender === 'male' && dailyTarget < 1500) {
            warning = `目標熱量低於 1500 kcal，可能有營養不良及代謝補償的風險。`;
          }
        }

        return { tdee, target: Math.round(dailyTarget), warning };
      }, [person, profiles]);

      const adjustDate = (days) => {
        const d = new Date(date);
        d.setDate(d.getDate() + days);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        setDate(`${year}-${month}-${day}`);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = () => {
          setCurrentImage(reader.result);
          setUserContext('');
        };
        reader.readAsDataURL(file);
      };

      const analyzeImage = async () => {
        const activeApiKey = customApiKey.trim() || defaultApiKey;
        
        if (!activeApiKey) {
          setErrorMsg('請先至「設定」分頁輸入您的 Gemini API 金鑰。');
          return;
        }

        if (!currentImage) return;
        setIsAnalyzing(true);
        setErrorMsg('');
        setPendingItem(null);

        try {
          const base64Data = currentImage.split(',')[1];
          const mimeType = currentImage.split(';')[0].split(':')[1];
          const extraContext = userContext.trim() ? `\n\n【使用者特別說明】：${userContext}\n警告：請務必優先採納上述說明來調整份量與熱量估算！` : '';

          const prompt = `
            分析這張食物照片。這是一份來自台灣使用者的飲食。${extraContext}
            請將照片中的食物拆解成不同的「單項品項」。
            請務必以 JSON 格式回傳，不要包含任何 Markdown 標記或其他文字。
            必須完全符合以下結構：
            {
              "items": [
                {
                  "name": "食物名稱 (如: 烤地瓜、香煎雞胸肉)",
                  "weight": 數字 (預估重量，單位為克),
                  "calories": 數字 (該預估重量下的熱量),
                  "protein": 數字 (該預估重量下的蛋白質)
                }
              ],
              "reasoning": "整體餐盤估算基準與隱藏油脂考量"
            }
          `;

          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                role: "user",
                parts: [
                  { text: prompt },
                  { inlineData: { mimeType: mimeType, data: base64Data } }
                ]
              }],
              generationConfig: {
                responseMimeType: "application/json"
              }
            })
          });

          if (!response.ok) {
            if (response.status === 400) throw new Error("API 金鑰無效，請至設定分頁檢查是否輸入正確。");
            throw new Error(`API 請求失敗狀態碼: ${response.status}`);
          }

          const data = await response.json();
          const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (data.usageMetadata) {
            const usedTokens = data.usageMetadata.totalTokenCount || 0;
            setTokenUsage(prev => {
              const newUsage = prev + usedTokens;
              const todayStr = new Date().toISOString().split('T')[0];
              localStorage.setItem('dietTrackerTokenUsage', JSON.stringify({ date: todayStr, usage: newUsage }));
              return newUsage;
            });
          }

          if (!textResult) throw new Error("API 未回傳有效內容");

          const resultObj = JSON.parse(textResult);
          const itemsList = Array.isArray(resultObj.items) ? resultObj.items : [];
          
          const processedItems = itemsList.map((item, idx) => {
            const weight = item.weight || 100;
            const calories = item.calories || 0;
            const protein = item.protein || 0;
            return {
              id: Date.now().toString() + '_' + idx,
              name: item.name || '未知',
              weight: weight,
              calories: calories,
              protein: protein,
              baseCalPerG: weight > 0 ? calories / weight : 0,
              baseProPerG: weight > 0 ? protein / weight : 0,
            };
          });
          
          setPendingItem({
            id: Date.now().toString(),
            items: processedItems.length > 0 ? processedItems : [{
              id: Date.now().toString() + '_0', name: '未辨識食物', weight: 100, calories: 0, protein: 0, baseCalPerG: 0, baseProPerG: 0
            }],
            reasoning: resultObj.reasoning || '無法提供估算依據',
            image: currentImage
          });

        } catch (error) {
          console.error("Analysis Error:", error);
          setErrorMsg(error.message || "圖片分析失敗。");
        } finally {
          setIsAnalyzing(false);
        }
      };

      const handleItemChange = (itemId, field, value) => {
        setPendingItem(prev => {
          if (!prev) return prev;
          const newItems = prev.items.map(item => {
            if (item.id !== itemId) return item;
            
            const updated = { ...item, [field]: value };
            if (value === '') return updated;

            const numVal = Number(value);
            
            if (field === 'weight' && item.baseCalPerG !== undefined) {
              updated.calories = Math.round(item.baseCalPerG * numVal);
              updated.protein = Math.round(item.baseProPerG * numVal * 10) / 10;
            } else if (field === 'calories' && item.weight) {
              updated.baseCalPerG = numVal / Number(item.weight);
            } else if (field === 'protein' && item.weight) {
              updated.baseProPerG = numVal / Number(item.weight);
            }
            
            return updated;
          });
          return { ...prev, items: newItems };
        });
      };

      const addManualItem = () => {
        setPendingItem(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            items: [...prev.items, { id: Date.now().toString(), name: '', weight: '', calories: '', protein: '', baseCalPerG: 0, baseProPerG: 0 }]
          };
        });
      };

      const removePendingItem = (itemId) => {
        setPendingItem(prev => {
          if (!prev) return prev;
          return {
            ...prev,
            items: prev.items.filter(i => i.id !== itemId)
          };
        });
      };

      const handleManualEntry = () => {
        setPendingItem({
          id: Date.now().toString(),
          items: [{ id: Date.now().toString() + '_m', name: '', weight: '', calories: '', protein: '', baseCalPerG: 0, baseProPerG: 0 }],
          reasoning: '手動輸入',
          image: null
        });
        setCurrentImage(null);
        setUserContext('');
        setIsAnalyzing(false);
      };

      const confirmItem = async () => {
        if (!pendingItem || !user) return;

        try {
          const logsRef = collection(db, 'diet_logs');
          await addDoc(logsRef, {
            person,
            date,
            meal,
            items: pendingItem.items,
            reasoning: pendingItem.reasoning,
            image: pendingItem.image, 
            createdAt: serverTimestamp(),
            creatorUid: user.uid
          });

          setDbError(''); // 寫入成功時清除錯誤
          setPendingItem(null);
          setCurrentImage(null);
          setUserContext('');
          if (fileInputRef.current) fileInputRef.current.value = '';
        } catch (error) {
          console.error("Error adding document: ", error);
          setDbError("寫入權限遭拒：" + error.message);
        }
      };

      const deleteLog = async (logId) => {
        if (!user) return;
        try {
          await deleteDoc(doc(db, 'diet_logs', logId));
        } catch (error) {
          console.error("Error deleting document: ", error);
          setDbError("刪除權限遭拒：" + error.message);
        }
      };

      const cancelItem = () => {
        setPendingItem(null);
        setCurrentImage(null);
        setUserContext('');
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-20">
          <header className="bg-white shadow-sm p-4 sticky top-0 z-20">
            <div className="max-w-md mx-auto flex flex-col gap-3">
              <div className="flex justify-between items-center">
                <h1 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                  <Utensils className="w-5 h-5 text-emerald-600" />
                  飲食紀錄 
                  <span className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-medium ml-1">專屬雲端免安裝版</span>
                </h1>
                
                <div className="flex bg-gray-100 p-1 rounded-full">
                  <button 
                    onClick={() => setActiveTab('record')}
                    className={`text-sm font-medium px-4 py-1.5 rounded-full transition-all ${activeTab === 'record' ? 'bg-white text-emerald-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                  >
                    紀錄
                  </button>
                  <button 
                    onClick={() => setActiveTab('settings')}
                    className={`text-sm font-medium px-4 py-1.5 rounded-full transition-all ${activeTab === 'settings' ? 'bg-white text-emerald-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                  >
                    設定
                  </button>
                </div>
              </div>

              <div className="flex items-center justify-between bg-emerald-50/50 rounded-lg p-2 border border-emerald-100/50">
                <div className="flex items-center gap-1.5 text-emerald-700">
                   <Zap className="w-4 h-4" />
                   <span className="text-xs font-bold">API 額度</span>
                </div>
                <div className="text-xs font-mono text-emerald-600 bg-white px-2 py-0.5 rounded shadow-sm border border-emerald-100">
                   {tokenUsage.toLocaleString()} / {DAILY_TOKEN_LIMIT.toLocaleString()}
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-md mx-auto p-4 space-y-5">
            {dbError && (
              <div className="bg-red-50 p-4 rounded-xl border border-red-200 flex gap-3 text-red-700 animate-in fade-in zoom-in-95">
                 <AlertCircle className="w-5 h-5 shrink-0" />
                 <div className="text-sm">
                    <p className="font-bold">資料庫連線異常</p>
                    <p className="mt-1">{dbError}</p>
                    <p className="mt-2 text-xs opacity-80">請至 Firebase 後台檢查「Authentication 授權網域」與「Firestore 安全規則」。</p>
                 </div>
              </div>
            )}

            {activeTab === 'settings' ? (
              <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 space-y-5 animate-in fade-in zoom-in-95 duration-200">
                
                <div className="p-4 bg-gray-50 border border-gray-200 rounded-xl">
                  <h3 className="text-sm font-bold text-gray-800 flex items-center gap-2 mb-2">
                    <Key className="w-4 h-4 text-emerald-600" /> API 金鑰設定
                  </h3>
                  <p className="text-xs text-gray-500 mb-3">此金鑰僅會儲存於您當前設備的瀏覽器中，不會上傳至任何伺服器。若清除瀏覽器資料需重新輸入。</p>
                  <input 
                    type="password" 
                    value={customApiKey}
                    placeholder="在此貼上您的 Gemini API Key"
                    onChange={(e) => handleSaveApiKey(e.target.value)}
                    className="w-full p-2.5 text-sm border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent font-mono"
                  />
                  {!customApiKey && !defaultApiKey && (
                    <p className="text-xs text-red-500 mt-2 flex items-center gap-1">
                      <AlertCircle className="w-3 h-3" /> 目前無有效金鑰，無法進行照片辨識。
                    </p>
                  )}
                </div>

                <h2 className="font-bold text-gray-800 flex items-center gap-2 pt-2 border-t border-gray-100">
                  <Settings className="w-5 h-5 text-gray-500" /> 身體數值與設定
                </h2>
                
                <div className="flex bg-gray-100 p-1 rounded-xl">
                  <button
                    onClick={() => setPerson('Ruby')}
                    className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${person === 'Ruby' ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-500'}`}
                  >
                    Ruby 的資料
                  </button>
                  <button
                    onClick={() => setPerson('佑霖')}
                    className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${person === '佑霖' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}
                  >
                    佑霖的資料
                  </button>
                </div>

                <div className="space-y-4 pt-2">
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs font-medium text-gray-500 mb-1.5">生理性別</label>
                      <select 
                        value={profiles[person].gender}
                        onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], gender: e.target.value}})}
                        className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                      >
                        <option value="male">男</option>
                        <option value="female">女</option>
                      </select>
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs font-medium text-gray-500 mb-1.5">年齡 (歲)</label>
                      <input 
                        type="number" value={profiles[person].age}
                        onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], age: Number(e.target.value)}})}
                        className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                      />
                    </div>
                  </div>

                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs font-medium text-gray-500 mb-1.5">身高 (cm)</label>
                      <input 
                        type="number" value={profiles[person].height}
                        onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], height: Number(e.target.value)}})}
                        className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                      />
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs font-medium text-gray-500 mb-1.5">體重 (kg)</label>
                      <input 
                        type="number" value={profiles[person].weight}
                        onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], weight: Number(e.target.value)}})}
                        className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-medium text-gray-500 mb-1.5 flex items-center gap-1">
                      <Activity className="w-3 h-3" /> 日常活動量
                    </label>
                    <select 
                      value={profiles[person].activity}
                      onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], activity: Number(e.target.value)}})}
                      className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                    >
                      <option value={1.2}>久坐 (辦公室工作，幾乎不運動)</option>
                      <option value={1.375}>輕度活動 (每週運動 1-3 天)</option>
                      <option value={1.55}>中度活動 (每週運動 3-5 天)</option>
                      <option value={1.725}>高度活動 (每週運動 6-7 天)</option>
                      <option value={1.9}>極度活動 (高強度勞力工作或每日雙重訓練)</option>
                    </select>
                  </div>

                  <div className="pt-4 border-t border-gray-100">
                    <h3 className="text-sm font-bold text-gray-800 mb-3">減脂目標設定</h3>
                    <div className="flex gap-4">
                      <div className="flex-1">
                        <label className="block text-xs font-medium text-gray-500 mb-1.5">預計減去 (kg)</label>
                        <input 
                          type="number" min="0" step="0.5" value={profiles[person].targetLoss || ''}
                          placeholder="0"
                          onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], targetLoss: Number(e.target.value)}})}
                          className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                        />
                      </div>
                      <div className="flex-1">
                        <label className="block text-xs font-medium text-gray-500 mb-1.5">預期花費時間 (週)</label>
                        <input 
                          type="number" min="0" value={profiles[person].targetWeeks || ''}
                          placeholder="0"
                          onChange={(e) => setProfiles({...profiles, [person]: {...profiles[person], targetWeeks: Number(e.target.value)}})}
                          className="w-full p-2.5 text-sm border border-gray-200 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-emerald-500"
                        />
                      </div>
                    </div>
                  </div>
                  
                  <div className="mt-6 p-5 bg-emerald-50 rounded-xl border border-emerald-100 text-center relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-2 opacity-5">
                      <Activity className="w-20 h-20" />
                    </div>
                    <p className="text-sm font-medium text-emerald-800 mb-1 relative z-10">
                      {profiles[person].targetLoss > 0 && profiles[person].targetWeeks > 0 ? '每日建議攝取熱量目標' : '系統試算每日總熱量消耗 (TDEE)'}
                    </p>
                    <p className="text-3xl font-bold text-emerald-600 relative z-10">{targetData.target} <span className="text-sm font-normal text-emerald-700">kcal / 天</span></p>
                    
                    {targetData.warning ? (
                      <div className="mt-3 p-2 bg-red-50 text-red-600 text-xs rounded-lg border border-red-100 text-left relative z-10">
                        <span className="font-bold flex items-center gap-1 mb-0.5"><AlertCircle className="w-3 h-3"/> 警告</span>
                        {targetData.warning}
                      </div>
                    ) : (
                      <p className="text-xs text-emerald-600/80 mt-2 relative z-10">
                        {profiles[person].targetLoss > 0 && profiles[person].targetWeeks > 0 
                          ? `已從 TDEE (${targetData.tdee} kcal) 扣除每日應減缺口` 
                          : 'Mifflin-St Jeor 公式計算'
                        }
                      </p>
                    )}
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-5 animate-in fade-in zoom-in-95 duration-200">
                <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                  
                  <div className="flex bg-gray-100 p-1 rounded-xl mb-4">
                    <button
                      onClick={() => setPerson('Ruby')}
                      className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${person === 'Ruby' ? 'bg-white shadow-sm text-emerald-600' : 'text-gray-500 hover:text-gray-700'}`}
                    >
                      Ruby
                    </button>
                    <button
                      onClick={() => setPerson('佑霖')}
                      className={`flex-1 py-2 rounded-lg text-sm font-bold transition-all ${person === '佑霖' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                    >
                      佑霖
                    </button>
                  </div>

                  <div className="flex flex-col gap-4">
                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1.5 flex items-center gap-1">
                        <Calendar className="w-3 h-3" /> 日期
                      </label>
                      <input
                        type="date"
                        value={date}
                        onChange={(e) => setDate(e.target.value)}
                        className="w-full p-2 text-sm border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none bg-gray-50"
                      />
                    </div>
                    
                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1.5 flex items-center gap-1">
                        <Clock className="w-3 h-3" /> 餐別
                      </label>
                      <div className="flex bg-gray-100 p-1 rounded-xl">
                        {['早餐', '午餐', '晚餐', '點心'].map((m) => (
                          <button
                            key={m}
                            onClick={() => setMeal(m)}
                            className={`flex-1 py-1.5 rounded-lg text-sm font-medium transition-all ${meal === m ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500'}`}
                          >
                            {m}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                  <div className="flex justify-between items-center mb-5">
                    <div className="text-center flex-1">
                      <p className="text-sm text-gray-500 mb-1">總攝取熱量</p>
                      <p className="text-3xl font-bold text-gray-800">{totalCalories}<span className="text-base font-normal text-gray-500 ml-1">kcal</span></p>
                    </div>
                    <div className="h-12 w-px bg-gray-200"></div>
                    <div className="text-center flex-1">
                      <p className="text-sm text-gray-500 mb-1">總蛋白質</p>
                      <p className={`text-3xl font-bold ${person === 'Ruby' ? 'text-emerald-600' : 'text-blue-600'}`}>{Math.round(totalProtein * 10)/10}<span className="text-base font-normal text-gray-500 ml-1">g</span></p>
                    </div>
                  </div>

                  <div className="border-t border-gray-100 pt-4">
                    <div className="flex justify-between items-end mb-2">
                      <span className="text-xs font-medium text-gray-500">每日目標: {targetData.target} kcal</span>
                      <span className={`text-xs font-bold ${totalCalories > targetData.target ? 'text-red-500' : 'text-gray-700'}`}>
                        {totalCalories > targetData.target ? `已超標 ${totalCalories - targetData.target} kcal` : `剩餘可吃 ${targetData.target - totalCalories} kcal`}
                      </span>
                    </div>
                    <div className="h-2.5 w-full bg-gray-100 rounded-full overflow-hidden flex">
                      <div 
                        className={`h-full transition-all duration-500 ${totalCalories > targetData.target ? 'bg-red-500' : person === 'Ruby' ? 'bg-emerald-400' : 'bg-blue-400'}`}
                        style={{ width: `${Math.min((totalCalories / targetData.target) * 100, 100)}%` }}
                      ></div>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 relative overflow-hidden">
                  {!currentImage && !pendingItem && (
                     <div className="absolute top-0 right-0 p-3 opacity-10 pointer-events-none">
                       <User className="w-24 h-24" />
                     </div>
                  )}

                  <input 
                    type="file" 
                    accept="image/*" 
                    className="hidden" 
                    ref={fileInputRef}
                    onChange={handleImageUpload}
                  />
                  
                  {!currentImage && !pendingItem && !isAnalyzing && (
                    <div className="flex flex-col gap-3 relative z-10">
                      <button 
                        onClick={() => fileInputRef.current?.click()}
                        className="w-full py-8 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-500 hover:bg-gray-50 hover:border-emerald-500 transition-colors"
                      >
                        <Camera className="w-8 h-8 mb-2 text-gray-400" />
                        <span className="font-medium">上傳照片至【{meal}】</span>
                        <span className="text-xs text-gray-400 mt-2">AI 將自動解析熱量與蛋白質</span>
                      </button>
                      <button
                        onClick={handleManualEntry}
                        className="w-full py-3.5 border border-gray-200 rounded-xl flex items-center justify-center gap-2 text-gray-600 hover:bg-gray-50 transition-colors bg-white shadow-sm"
                      >
                        <Edit2 className="w-4 h-4" />
                        <span className="font-medium text-sm">直接手動輸入營養素</span>
                      </button>
                    </div>
                  )}

                  {currentImage && !isAnalyzing && !pendingItem && (
                    <div className="space-y-4 animate-in fade-in zoom-in duration-200">
                      <div className="relative h-48 rounded-xl overflow-hidden bg-gray-100">
                        <img src={currentImage} alt="Preview" className="w-full h-full object-cover" />
                        <div className="absolute top-2 left-2 flex gap-1">
                           <span className="bg-black/60 text-white text-xs px-2 py-1 rounded-md backdrop-blur-sm">{person}</span>
                           <span className="bg-black/60 text-white text-xs px-2 py-1 rounded-md backdrop-blur-sm">{meal}</span>
                        </div>
                      </div>

                      <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                        <label className="block text-sm font-bold text-emerald-800 mb-2 flex items-center gap-1">
                           <Edit2 className="w-4 h-4" /> 補充說明 (選填)
                        </label>
                        <textarea
                          value={userContext}
                          onChange={(e) => setUserContext(e.target.value)}
                          placeholder="例如：我只吃了4/10、這是13吋的披薩..."
                          className="w-full p-3 bg-white border border-emerald-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-sm resize-none"
                          rows="3"
                        />
                      </div>

                      <div className="flex gap-3 pt-2">
                        <button
                          onClick={() => { setCurrentImage(null); setUserContext(''); if (fileInputRef.current) fileInputRef.current.value = ''; }}
                          className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-lg font-medium hover:bg-gray-200 flex items-center justify-center gap-2"
                        >
                          <X className="w-4 h-4" /> 重新選擇
                        </button>
                        <button
                          onClick={analyzeImage}
                          className="flex-1 py-2.5 bg-emerald-600 text-white rounded-lg font-bold hover:bg-emerald-700 flex items-center justify-center gap-2 shadow-sm transition-colors"
                        >
                          <Camera className="w-4 h-4" /> 開始 AI 辨識
                        </button>
                      </div>
                    </div>
                  )}

                  {isAnalyzing && (
                    <div className="py-12 flex flex-col items-center justify-center">
                      <div className="w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <p className="text-gray-600 font-medium">AI 正在分析食物成分...</p>
                    </div>
                  )}

                  {errorMsg && (
                    <div className="mt-4 p-4 bg-red-50 text-red-700 rounded-xl flex items-start gap-3 border border-red-100">
                      <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                      <div>
                        <p className="font-medium text-sm">辨識發生錯誤</p>
                        <p className="text-xs mt-1 opacity-80">{errorMsg}</p>
                      </div>
                    </div>
                  )}

                  {pendingItem && !isAnalyzing && (
                    <div className="space-y-4 animate-in fade-in zoom-in duration-200">
                      {pendingItem.image ? (
                        <div className="relative h-48 rounded-xl overflow-hidden bg-gray-100">
                          <img src={currentImage} alt="Uploaded food" className="w-full h-full object-cover" />
                          <div className="absolute top-2 left-2 flex gap-1">
                             <span className="bg-black/60 text-white text-xs px-2 py-1 rounded-md backdrop-blur-sm">{person}</span>
                             <span className="bg-black/60 text-white text-xs px-2 py-1 rounded-md backdrop-blur-sm">{meal}</span>
                          </div>
                        </div>
                      ) : (
                        <div className="bg-gray-50 border border-gray-100 h-24 rounded-xl flex flex-col items-center justify-center relative">
                           <Edit2 className="w-6 h-6 text-gray-400 mb-1" />
                           <span className="text-sm font-medium text-gray-500">手動建立紀錄</span>
                           <div className="absolute top-2 left-2 flex gap-1">
                             <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-md font-medium">{person}</span>
                             <span className="bg-emerald-100 text-emerald-700 text-xs px-2 py-1 rounded-md font-medium">{meal}</span>
                          </div>
                        </div>
                      )}
                      
                      {pendingItem.image && (
                        <div className="bg-emerald-50 text-emerald-800 p-3 rounded-lg text-sm flex gap-2 items-start">
                          <AlertCircle className="w-4 h-4 shrink-0 mt-0.5" />
                          <div>
                            <p className="font-medium">AI 估算依據</p>
                            <p className="text-xs opacity-90 mt-0.5">{pendingItem.reasoning}</p>
                          </div>
                        </div>
                      )}

                      <div className="space-y-3">
                        {pendingItem.items.map((item, index) => (
                          <div key={item.id} className="bg-gray-50 p-3 rounded-xl border border-gray-100 relative group">
                            {pendingItem.items.length > 1 && (
                              <button 
                                onClick={() => removePendingItem(item.id)}
                                className="absolute -top-2 -right-2 bg-red-100 text-red-600 p-1 rounded-full shadow-sm hover:bg-red-200"
                              >
                                <X className="w-3 h-3" />
                              </button>
                            )}
                            <div className="mb-2">
                              <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center gap-1">
                                <Edit2 className="w-3 h-3" /> 品項 {index + 1}
                              </label>
                              <input 
                                type="text" 
                                value={item.name}
                                placeholder="例如：御飯糰"
                                onChange={(e) => handleItemChange(item.id, 'name', e.target.value)}
                                className="w-full p-2 text-sm bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-gray-800"
                              />
                            </div>
                            <div className="grid grid-cols-3 gap-2">
                              <div>
                                <label className="block text-[10px] font-bold text-gray-500 mb-1">重量 (g)</label>
                                <input 
                                  type="number" 
                                  value={item.weight}
                                  placeholder="0"
                                  onChange={(e) => handleItemChange(item.id, 'weight', e.target.value)}
                                  className="w-full p-2 text-sm bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-gray-800"
                                />
                              </div>
                              <div>
                                <label className="block text-[10px] font-bold text-gray-500 mb-1">熱量 (kcal)</label>
                                <input 
                                  type="number" 
                                  value={item.calories}
                                  placeholder="0"
                                  onChange={(e) => handleItemChange(item.id, 'calories', e.target.value)}
                                  className="w-full p-2 text-sm bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-gray-800"
                                />
                              </div>
                              <div>
                                <label className="block text-[10px] font-bold text-gray-500 mb-1">蛋白質 (g)</label>
                                <input 
                                  type="number" 
                                  value={item.protein}
                                  placeholder="0"
                                  onChange={(e) => handleItemChange(item.id, 'protein', e.target.value)}
                                  className="w-full p-2 text-sm bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-medium text-blue-600"
                                />
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                      
                      <button 
                        onClick={addManualItem}
                        className="w-full py-2 border border-dashed border-gray-300 rounded-lg text-sm text-gray-500 hover:bg-gray-50 hover:text-emerald-600 flex items-center justify-center gap-1"
                      >
                        <Plus className="w-4 h-4" /> 新增品項
                      </button>

                      <div className="flex gap-3 pt-2">
                        <button 
                          onClick={cancelItem}
                          className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-lg font-medium hover:bg-gray-200 flex items-center justify-center gap-2"
                        >
                          <X className="w-4 h-4" /> 取消
                        </button>
                        <button 
                          onClick={confirmItem}
                          className="flex-1 py-2.5 bg-gray-800 text-white rounded-lg font-medium hover:bg-gray-900 flex items-center justify-center gap-2 shadow-md"
                        >
                          <Check className="w-4 h-4" /> 確認存入雲端
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                <div className="space-y-3 pb-8">
                  <div className="flex items-center justify-between bg-white p-2 rounded-xl shadow-sm border border-gray-100">
                    <button 
                      onClick={() => adjustDate(-1)} 
                      className="p-2 hover:bg-gray-100 rounded-lg text-gray-500 transition-colors"
                    >
                      <ChevronLeft className="w-5 h-5" />
                    </button>
                    <div className="text-center">
                      <div className="text-sm font-bold text-gray-800">
                        {date === new Date().toISOString().split('T')[0] ? '今天' : date}
                      </div>
                      <div className="text-[10px] text-gray-400 mt-0.5">{person} 的雲端紀錄</div>
                    </div>
                    <button 
                      onClick={() => adjustDate(1)} 
                      className="p-2 hover:bg-gray-100 rounded-lg text-gray-500 transition-colors"
                    >
                      <ChevronRight className="w-5 h-5" />
                    </button>
                  </div>

                  {!user && (
                     <div className="py-8 text-center text-sm text-gray-400 bg-gray-50/50 rounded-xl border border-dashed border-gray-200">
                      正在連線至雲端資料庫...
                    </div>
                  )}

                  {user && filteredLog.length === 0 ? (
                    <div className="py-8 text-center text-sm text-gray-400 bg-gray-50/50 rounded-xl border border-dashed border-gray-200">
                      這天還沒有任何紀錄喔
                    </div>
                  ) : (
                    filteredLog.map((entry) => {
                      const entryCalories = entry.items.reduce((s, i) => s + Number(i.calories || 0), 0);
                      const entryProtein = entry.items.reduce((s, i) => s + Number(i.protein || 0), 0);
                      const itemNames = entry.items.map(i => i.name).join('、');
                      
                      return (
                      <div key={entry.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4 relative group">
                        <button 
                          onClick={() => deleteLog(entry.id)}
                          className="absolute top-2 right-2 p-1.5 text-gray-300 hover:bg-red-50 hover:text-red-500 rounded-md opacity-0 group-hover:opacity-100 transition-all"
                          title="刪除此紀錄"
                        >
                          <Trash2 className="w-4 h-4" />
                        </button>
                        <div className="w-16 h-16 rounded-lg overflow-hidden shrink-0 bg-gray-50 flex items-center justify-center border border-gray-100 relative">
                          {entry.image ? (
                            <img src={entry.image} alt="food" className="w-full h-full object-cover" />
                          ) : (
                            <Utensils className="w-6 h-6 text-gray-300" />
                          )}
                        </div>
                        <div className="flex-1 min-w-0 pr-6">
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-[10px] font-medium bg-gray-100 text-gray-600 px-2 py-0.5 rounded shrink-0">
                              {entry.meal}
                            </span>
                            <h4 className="font-medium text-gray-800 truncate text-sm">{itemNames || '未命名項目'}</h4>
                          </div>
                          <div className="flex items-center gap-3 text-sm">
                            <span className="text-gray-500">{entryCalories} kcal</span>
                            <span className="text-blue-600">{Math.round(entryProtein * 10)/10}g 蛋白質</span>
                          </div>
                          <div className="text-xs text-gray-400 mt-1 truncate">
                            {entry.items.map(i => `${i.name}(${i.weight}g)`).join(', ')}
                          </div>
                        </div>
                      </div>
                    )})
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
